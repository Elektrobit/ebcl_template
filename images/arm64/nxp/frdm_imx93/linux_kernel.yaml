# Derive values from base.yaml - relative path
base: base.yaml
# Reset the kernel value - we don't want to download and extract it
kernel: null
# Do pack the files as tar
tar: false
# do not download and extract these packages, they are already installed in the tools.tar
use_packages: false
# Name of the boot root archive
#base_tarball: $$RESULTS$$/boot_root.tar
host_files:
  - source: $$RESULTS$$/../frdm_imx93_fit.its
    destination: frdm_imx93_fit.its
  #- source: $$RESULTS$$/../bootloader/boot.cmd
  #  destination: boot.cmd
  - source: $$RESULTS$$/../kernel/build/linux_build/arch/arm64/boot/Image
    destination: Image
  - source: $$RESULTS$$/../kernel/build/linux_build/arch/arm64/boot/dts/freescale/imx93-11x11-evk.dtb
    destination: imx93-11x11-evk.dtb
