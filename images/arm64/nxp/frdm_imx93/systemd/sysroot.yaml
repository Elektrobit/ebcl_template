# CPU architecture
arch: arm64
# Add the EB corbos Linux apt repo
use_ebcl_apt: true
# Add repo with NXP RDB2 packages
apt_repos:
  - apt_repo: https://linux.elektrobit.com/eb-corbos-linux/v1.7.0
    distro: ebcl_nxp_public
    components:
      - nxp_public
    key: file:///build/keys/elektrobit.pub
    gpg: /etc/berrymill/keyrings.d/elektrobit.gpg
  - apt_repo: http://ports.ubuntu.com/ubuntu-ports
    distro: jammy
    components:
      - main
      - universe
      - multiverse
      - restricted
  # Get latest security fixes
  - apt_repo: http://ports.ubuntu.com/ubuntu-ports
    distro: jammy-security
    components:
      - main
      - universe
      - multiverse
      - restricted
packages:
  - systemd
  - udev # udev will create the device node for ttyS0
  - util-linux
  - uuid-dev # needed for optee-client and creating the sysroot
  - libc6-dev-arm64-cross # needed for optee-client and creating the sysroot
  - libc6:arm64
  - libc6-dev
  - libssl-dev
# Scripts to configure the root tarball
#host_files:
#  - source: $$RESULTS$$/../../kernel/build/linux_build/arch/arm64/boot/Image
#    destination: boot
#  - source: $$RESULTS$$/../../kernel/build/linux_build/arch/arm64/boot/dts/freescale/imx93-11x11-evk.dtb
#    destination: boot
# Scripts to configure the root tarball
host_files:
  - source: system_config/*
    uid: 0
    gid: 0
    mode: 755
scripts:
  - name: config_root.sh # Name of the script, relative path to this file
    env: chroot # Type of execution environment
